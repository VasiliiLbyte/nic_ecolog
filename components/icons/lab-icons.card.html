<!-- @dsCard group="Components" viewport="720x420" subtitle="Lucide subset — gradient squircle 48px + stroke 1.8px white" name="Lab capability icons" -->
<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--grad-lab);color:#fff;padding:40px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:720px}
  .card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:24px 20px}
  .ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 8px 24px rgba(19,158,161,.35)}
  .ico svg{width:24px;height:24px;stroke:#fff;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  h3{margin:0 0 6px;font-size:16px;font-weight:500}
  p{margin:0;font-size:13px;color:rgba(255,255,255,.65);line-height:1.5}
  .eye{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;color:var(--lime);text-transform:uppercase;margin-bottom:20px;display:block}
</style></head>
<body>
  <span class="eye">assets/icons/lab · Lucide MIT</span>
  <div class="grid">
    <div class="card"><div class="ico" style="background:linear-gradient(135deg,#ADCF7A,#139EA1)"><svg viewBox="0 0 24 24"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5S5 13 5 15a7 7 0 0 0 7 7"/></svg></div><h3>Вода</h3><p>droplet</p></div>
    <div class="card"><div class="ico" style="background:linear-gradient(135deg,#139EA1,#1C6BA2)"><svg viewBox="0 0 24 24"><path d="M12.8 19.6A2 2 0 1 0 14 16H2m15.5-8a2.5 2.5 0 1 1 2 4H2m7.8-7.6A2 2 0 1 1 11 8H2"/></svg></div><h3>Воздух</h3><p>wind</p></div>
    <div class="card"><div class="ico" style="background:linear-gradient(135deg,#4CB272,#0B5C60)"><svg viewBox="0 0 24 24"><path d="m8 3 4 8 5-5 5 15H2z"/></svg></div><h3>Почвы</h3><p>mountain</p></div>
    <div class="card"><div class="ico" style="background:linear-gradient(135deg,#1C6BA2,#139EA1)"><svg viewBox="0 0 24 24"><path d="M10 11v6m4-6v6m5-11v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div><h3>Отходы</h3><p>trash-2</p></div>
  </div>
</body></html>
