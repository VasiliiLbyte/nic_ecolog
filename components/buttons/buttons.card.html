<!-- @dsCard group="Components" viewport="700x200" subtitle="Pill CTA · grad / ghost / ghost-light · md & sm" name="Button" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-body)}
.wrap{display:flex;flex-direction:column}
.l{background:var(--bg);padding:26px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.d{background:var(--grad-esg);padding:26px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;border-radius:var(--r-pill);font-family:var(--font-body);font-size:16px;font-weight:500;line-height:1;text-decoration:none;border:1px solid transparent;cursor:pointer;padding:17px 30px}
.sm{font-size:14px;padding:12px 24px}
.grad{color:#fff;background:var(--grad-brand);box-shadow:0 10px 26px -10px rgba(19,158,161,0.55)}
.ghost{color:var(--teal-deep);background:transparent;border-color:var(--line-strong)}
.gl{color:#fff;background:rgba(255,255,255,0.10);border-color:rgba(255,255,255,0.32)}</style></head>
<body><div class="wrap">
  <div class="l">
    <a class="btn grad">Заказать исследование <span>→</span></a>
    <a class="btn ghost">Услуги</a>
    <a class="btn grad sm">Отправить</a>
    <a class="btn ghost sm">Подробнее</a>
  </div>
  <div class="d">
    <a class="btn gl">Услуги ESG <span>→</span></a>
    <a class="btn grad">Обсудим задачу</a>
  </div>
</div></body></html>
