<!-- @dsCard group="Components" viewport="700x200" subtitle="Mono eyebrow + labelled fact pills" name="Eyebrow & MetaPill" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--bg);padding:26px}
.eye{display:inline-flex;align-items:center;gap:13px;font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--teal-deep)}
.eye .ln{width:30px;height:1px;background:currentColor;opacity:0.6}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
.pill{display:inline-flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--line);border-radius:var(--r-pill);padding:10px 20px;font-size:14px;color:var(--slate-1)}
.pill .k{font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;color:var(--slate-4)}</style></head>
<body>
  <span class="eye"><span class="ln"></span>Независимый исследовательский центр · Санкт-Петербург</span>
  <div class="row">
    <span class="pill"><span class="k">СРОК</span> 1–3 месяца</span>
    <span class="pill"><span class="k">КОМУ</span> объекты I–III категорий НВОС</span>
    <span class="pill"><span class="k">РЕЗУЛЬТАТ</span> утверждённые нормативы</span>
  </div>
</body></html>
