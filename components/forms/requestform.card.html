<!-- @dsCard group="Components" viewport="480x520" subtitle="Lead form — mono labels, mint fields, teal focus" name="RequestForm" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--white);padding:30px}
form{display:flex;flex-direction:column;gap:16px;max-width:380px}
.f{display:flex;flex-direction:column;gap:8px}
label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.18em;color:var(--slate-4);text-transform:uppercase}
input,textarea{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-xs);padding:15px 18px;font-family:var(--font-body);font-size:15px;color:var(--ink-2);outline:none;width:100%;box-sizing:border-box}
input:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(19,158,161,.15)}
textarea{resize:vertical}
button{margin-top:4px;background:var(--grad-brand);color:#fff;font-family:var(--font-body);font-size:16px;font-weight:500;border:none;border-radius:var(--r-pill);padding:17px 38px;cursor:pointer}
.note{margin:0;font-size:12px;color:var(--slate-5);line-height:1.6}
.note a{color:var(--teal)}</style></head>
<body><form onsubmit="return false">
  <div class="f"><label>Имя</label><input type="text" placeholder="Как к вам обращаться"></div>
  <div class="f"><label>Телефон</label><input type="tel" placeholder="+7 (___) ___-__-__"></div>
  <div class="f"><label>Задача</label><textarea rows="3" placeholder="Например: нужен проект СЗЗ для площадки"></textarea></div>
  <button type="submit">Отправить заявку</button>
  <p class="note">Нажимая кнопку, вы соглашаетесь с <a href="#">политикой конфиденциальности</a>.</p>
</form></body></html>
