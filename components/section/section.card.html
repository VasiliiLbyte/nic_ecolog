<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--white);padding:30px 30px}
.eye{font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--teal-deep)}
h2{margin:20px 0 0;font-weight:300;font-size:42px;line-height:1.12;letter-spacing:-0.01em;color:var(--ink);max-width:640px;text-wrap:balance}
.desc{display:flex;justify-content:flex-end;margin-top:24px}
.desc p{margin:0;max-width:420px;font-size:18px;line-height:1.65;color:var(--slate-2)}</style></head>
<body>
  <span class="eye">Портфель</span>
  <h2>Объекты, которым нужна точность</h2>
  <div class="desc"><p>Работаем с объектами федерального масштаба — от небоскрёбов до портовых акваторий и театров.</p></div>
</body></html>
