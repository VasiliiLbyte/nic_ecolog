<!-- @dsCard group="Components" viewport="700x300" subtitle="Dark band for Lab / ESG / Contact — gradient + accent blob" name="DarkSection" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;font-family:var(--font-body)}
.sec{position:relative;overflow:hidden;padding:48px 40px;background:var(--grad-esg);color:#fff}
.blob{position:absolute;top:-40%;right:-10%;width:50%;height:160%;border-radius:50%;background:radial-gradient(circle,#ADCF7A 0%,rgba(173,207,122,0) 66%);filter:blur(70px);opacity:.32}
.eye{font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--lime)}
h2{margin:16px 0 0;font-family:var(--font-display);font-weight:300;font-size:54px;line-height:1.02}
.gtl{background:var(--grad-text-l);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{margin:18px 0 0;max-width:440px;font-size:16px;line-height:1.65;color:rgba(255,255,255,.82)}
.slog{margin:18px 0 0;font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;color:rgba(255,255,255,.5)}</style></head>
<body><div class="sec"><div class="blob"></div>
  <span class="eye">ESG · устойчивое развитие</span>
  <h2>ECO IS <span class="gtl">DATA</span></h2>
  <p class="sub">Экология — это измеримые величины, а не декларации. Каждое решение опирается на данные и расчёты.</p>
  <p class="slog">NO DATA — NO DECISION · SCIENCE FOR NATURE</p>
</div></body></html>
