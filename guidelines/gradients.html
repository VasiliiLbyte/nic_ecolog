<!-- @dsCard group="Colors" viewport="700x200" subtitle="Mesh fills, gradient text & dark-section gradients" name="Brand gradients" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--white)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:22px}
.g{height:74px;border-radius:14px;display:flex;align-items:flex-end;padding:11px;box-sizing:border-box}
.g span{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.92);font-weight:500}
.t{display:flex;align-items:center;justify-content:center;height:74px;border-radius:14px;border:1px solid var(--line)}
.t b{font-size:30px;font-weight:300}
.gt{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}</style></head>
<body><div class="grid">
  <div class="g" style="background:var(--grad-brand)"><span>--grad-brand</span></div>
  <div class="g" style="background:var(--grad-esg)"><span>--grad-esg</span></div>
  <div class="g" style="background:var(--grad-lab)"><span>--grad-lab</span></div>
  <div class="t"><b class="gt">Aa решения</b></div>
  <div class="g" style="background:var(--grad-result)"><span>--grad-result</span></div>
  <div class="g" style="background:var(--navy);align-items:center;justify-content:center"><b style="font-size:26px;font-weight:300;background:var(--grad-text-l);-webkit-background-clip:text;background-clip:text;color:transparent">ECO IS DATA</b></div>
</div></body></html>
