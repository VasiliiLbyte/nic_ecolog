<!-- @dsCard group="Spacing" viewport="700x200" subtitle="8-pt base · section rhythm 120–140px" name="Spacing scale" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--white);padding:24px}
.r{display:flex;align-items:center;gap:14px;margin-bottom:9px}
.bar{height:14px;background:var(--grad-brand);border-radius:4px}
.n{font-family:var(--font-mono);font-size:11px;color:var(--slate-3);width:118px}</style></head>
<body>
  <div class="r"><span class="n">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="n">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="n">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="n">--space-10 · 40</span><div class="bar" style="width:40px"></div></div>
  <div class="r"><span class="n">--space-12 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="n">--space-16 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="r"><span class="n">--space-20 · 80</span><div class="bar" style="width:80px"></div></div>
  <div class="r"><span class="n">section · 120</span><div class="bar" style="width:120px;opacity:0.5"></div></div>
</body></html>
