<!-- @dsCard group="Colors" viewport="700x180" subtitle="Lime → green → teal → ocean → deep blue" name="Brand mesh ramp" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--white)}
.row{display:flex;gap:0;padding:22px}
.sw{flex:1;height:118px;border-radius:14px;margin-right:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box}
.sw:last-child{margin-right:0}
.sw b{font-size:12px;font-weight:600;color:#fff;mix-blend-mode:normal}
.sw span{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.8)}
.dk b,.dk span{color:#fff}</style></head>
<body><div class="row">
  <div class="sw" style="background:var(--lime)"><b>Lime</b><span>#ADCF7A</span></div>
  <div class="sw" style="background:var(--green)"><b>Green</b><span>#4CB272</span></div>
  <div class="sw" style="background:var(--teal)"><b>Teal</b><span>#139EA1</span></div>
  <div class="sw" style="background:var(--teal-deep)"><b>Petrol</b><span>#0B5C60</span></div>
  <div class="sw" style="background:var(--ocean)"><b>Ocean</b><span>#1C6BA2</span></div>
  <div class="sw" style="background:var(--blue-deep)"><b>Deep blue</b><span>#122E54</span></div>
  <div class="sw" style="background:var(--navy)"><b>Navy</b><span>#06141C</span></div>
</div></body></html>
