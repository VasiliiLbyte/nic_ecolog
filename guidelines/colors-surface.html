<!-- @dsCard group="Colors" viewport="700x170" subtitle="Page, card, dark & lab surfaces" name="Surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--white)}
.row{display:flex;gap:10px;padding:22px}
.sw{flex:1;height:108px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;border:1px solid var(--line)}
.sw b{font-size:12px;font-weight:600}
.sw span{font-family:var(--font-mono);font-size:10px;opacity:0.7}</style></head>
<body><div class="row">
  <div class="sw" style="background:var(--white);color:var(--ink)"><b>White</b><span>#FFFFFF</span></div>
  <div class="sw" style="background:var(--bg);color:var(--ink)"><b>Page</b><span>#F7FBF9</span></div>
  <div class="sw" style="background:var(--bg-2);color:var(--ink)"><b>Alt / input</b><span>#F4F8F7</span></div>
  <div class="sw" style="background:var(--surface-lab);color:#fff"><b>Lab dark</b><span>#0A3D42</span></div>
  <div class="sw" style="background:var(--navy);color:#fff"><b>Section dark</b><span>#06141C</span></div>
</div></body></html>
