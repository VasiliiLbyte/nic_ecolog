<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--white);padding:26px}
.eye{font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--teal-deep)}
.lab{font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--slate-4);margin-top:18px}
.slog{font-family:var(--font-mono);font-size:13px;letter-spacing:0.24em;color:var(--teal-deep);margin-top:18px}
.dim{color:var(--slate-4)}</style></head>
<body>
  <div class="eye">Независимый исследовательский центр · Санкт-Петербург</div>
  <div class="lab">Срок · Кому · Результат</div>
  <div class="slog">ECO IS DATA&nbsp;&nbsp;·&nbsp;&nbsp;<span class="dim">NO DATA — NO DECISION</span>&nbsp;&nbsp;·&nbsp;&nbsp;SCIENCE FOR NATURE</div>
</body></html>
