<!-- @dsCard group="Colors" viewport="700x170" subtitle="Cool-leaning ink & slate neutrals" name="Ink & neutrals" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--white)}
.row{display:flex;gap:10px;padding:22px}
.sw{flex:1;height:108px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;border:1px solid var(--line-soft)}
.sw b{font-size:12px;font-weight:600}
.sw span{font-family:var(--font-mono);font-size:10px;opacity:0.7}</style></head>
<body><div class="row">
  <div class="sw" style="background:var(--ink);color:#fff"><b>Ink</b><span>#13282B</span></div>
  <div class="sw" style="background:var(--slate-1);color:#fff"><b>Slate 1</b><span>#2C4346</span></div>
  <div class="sw" style="background:var(--slate-2);color:#fff"><b>Slate 2</b><span>#3E5557</span></div>
  <div class="sw" style="background:var(--slate-3);color:#fff"><b>Slate 3</b><span>#51696B</span></div>
  <div class="sw" style="background:var(--slate-4);color:#fff"><b>Slate 4</b><span>#7A8E8E</span></div>
  <div class="sw" style="background:var(--slate-5);color:#fff"><b>Slate 5</b><span>#8AA0A0</span></div>
</div></body></html>
