<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Card radii 12–28px · pill 999" name="Corner radii" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--white);padding:24px}
.row{display:flex;gap:16px;align-items:flex-end}
.b{width:96px;height:84px;background:var(--bg-2);border:1px solid var(--line);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;box-sizing:border-box}
.b span{font-family:var(--font-mono);font-size:10px;color:var(--slate-3)}
.pill{width:120px;height:46px;border-radius:999px;background:var(--grad-brand);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-mono);font-size:10px}</style></head>
<body><div class="row">
  <div class="b" style="border-radius:12px"><span>xs · 12</span></div>
  <div class="b" style="border-radius:20px"><span>md · 20</span></div>
  <div class="b" style="border-radius:24px"><span>lg · 24</span></div>
  <div class="b" style="border-radius:28px"><span>xl · 28</span></div>
  <div class="pill">pill · 999</div>
</div></body></html>
