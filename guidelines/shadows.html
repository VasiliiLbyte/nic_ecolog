<!-- @dsCard group="Spacing" viewport="700x180" subtitle="Accent-tinted elevation · never neutral gray" name="Shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-body);background:var(--bg);padding:30px}
.row{display:flex;gap:26px}
.c{flex:1;height:96px;background:var(--white);border-radius:20px;display:flex;align-items:flex-end;padding:12px;box-sizing:border-box}
.c span{font-family:var(--font-mono);font-size:10px;color:var(--slate-3)}</style></head>
<body><div class="row">
  <div class="c" style="box-shadow:var(--shadow-card)"><span>--shadow-card</span></div>
  <div class="c" style="box-shadow:var(--shadow-btn)"><span>--shadow-btn</span></div>
  <div class="c" style="box-shadow:var(--shadow-pop)"><span>--shadow-pop</span></div>
</div></body></html>
