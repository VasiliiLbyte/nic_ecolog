<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-display);background:var(--white);color:var(--ink);padding:26px}
.hero{font-weight:300;font-size:56px;line-height:1.04;letter-spacing:-0.015em;margin:0;max-width:620px}
.gt{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}
.d{font-weight:300;font-size:34px;line-height:1.12;margin:18px 0 0}
.meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;color:var(--slate-4);margin-top:16px}</style></head>
<body>
  <h1 class="hero">Превращаем <span class="gt">данные</span> в решения</h1>
  <div class="d">Полный спектр инжиниринга</div>
  <div class="meta">Onest 300 · --fs-hero clamp(44–92px) · --fs-display</div>
</body></html>
