<!-- @dsCard group="Brand" viewport="700x220" subtitle="Fingerprint mark + wordmark · on light & dark" name="Logo lockup" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-display);display:flex}
.half{flex:1;display:flex;align-items:center;gap:14px;padding:30px;box-sizing:border-box}
.light{background:var(--bg)}
.dark{background:var(--navy)}
.half img{height:48px;width:auto;display:block}
.wm{display:flex;flex-direction:column;line-height:1.1}
.wm b{font-size:22px;font-weight:600;letter-spacing:0.01em}
.wm span{font-size:10px;letter-spacing:0.04em;margin-top:2px}
.light .wm b{color:var(--teal-deep)} .light .wm span{color:var(--slate-3)}
.dark .wm b{color:#fff} .dark .wm span{color:rgba(255,255,255,0.6)}</style></head>
<body>
  <div class="half light">
    <img src="../assets/fingerprint-color.png" alt="Эколог">
    <div class="wm"><b>Эколог</b><span>независимый исследовательский центр</span></div>
  </div>
  <div class="half dark">
    <img src="../assets/fingerprint-white.png" alt="Эколог">
    <div class="wm"><b>Эколог</b><span>независимый исследовательский центр</span></div>
  </div>
</body></html>
